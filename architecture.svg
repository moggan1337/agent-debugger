<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="20" font-weight="600">Architecture</text>
  
  <!-- Central Inspector -->
  <rect x="300" y="200" width="200" height="100" rx="12" fill="#1a1a2e" stroke="url(#primary)" stroke-width="2"/>
  <text x="400" y="235" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="600">Inspector</text>
  <text x="400" y="258" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Unified Debug Interface</text>
  
  <!-- Connection lines -->
  <line x1="300" y1="250" x2="180" y2="250" stroke="url(#purple)" stroke-width="2"/>
  <line x1="500" y1="250" x2="620" y2="250" stroke="url(#orange)" stroke-width="2"/>
  <line x1="400" y1="200" x2="400" y2="100" stroke="url(#green)" stroke-width="2"/>
  <line x1="400" y1="300" x2="400" y2="400" stroke="url(#primary)" stroke-width="2"/>
  
  <!-- Tracer (Left) -->
  <rect x="60" y="200" width="130" height="100" rx="10" fill="#1a1a2e" stroke="url(#purple)" stroke-width="2"/>
  <text x="125" y="230" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">🧠 Tracer</text>
  
  <rect x="75" y="245" width="100" height="6" rx="3" fill="#1e293b"/>
  <rect x="75" y="245" width="70" height="6" rx="3" fill="url(#purple)" opacity="0.7"/>
  
  <rect x="75" y="258" width="100" height="6" rx="3" fill="#1e293b"/>
  <rect x="75" y="258" width="50" height="6" rx="3" fill="url(#purple)" opacity="0.5"/>
  
  <rect x="75" y="271" width="100" height="6" rx="3" fill="#1e293b"/>
  <rect x="75" y="271" width="85" height="6" rx="3" fill="url(#purple)" opacity="0.3"/>
  
  <!-- Memory Viewer (Top) -->
  <rect x="300" y="60" width="200" height="90" rx="10" fill="#1a1a2e" stroke="url(#green)" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">📊 Memory</text>
  
  <text x="320" y="115" fill="#64748b" font-family="system-ui" font-size="9">Short</text>
  <rect x="360" y="108" width="130" height="8" rx="4" fill="#1e293b"/>
  <rect x="360" y="108" width="80" height="8" rx="4" fill="url(#green)"/>
  
  <text x="320" y="135" fill="#64748b" font-family="system-ui" font-size="9">Long</text>
  <rect x="360" y="128" width="130" height="8" rx="4" fill="#1e293b"/>
  <rect x="360" y="128" width="100" height="8" rx="4" fill="url(#primary)"/>
  
  <!-- Tool Tracker (Right) -->
  <rect x="610" y="200" width="130" height="100" rx="10" fill="#1a1a2e" stroke="url(#orange)" stroke-width="2"/>
  <text x="675" y="230" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">🔧 Tools</text>
  
  <circle cx="630" cy="255" r="4" fill="#10b981"/>
  <text x="642" y="258" fill="#94a3b8" font-family="system-ui" font-size="9">search ✓</text>
  
  <circle cx="630" cy="272" r="4" fill="#10b981"/>
  <text x="642" y="275" fill="#94a3b8" font-family="system-ui" font-size="9">read ✓</text>
  
  <circle cx="630" y="289" r="4" fill="#ef4444"/>
  <text x="642" y="292" fill="#94a3b8" font-family="system-ui" font-size="9">exec ✗</text>
  
  <!-- Performance (Bottom) -->
  <rect x="300" y="400" width="200" height="70" rx="10" fill="#1a1a2e" stroke="url(#primary)" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="500">⚡ Performance</text>
  
  <rect x="320" y="440" width="60" height="25" rx="5" fill="#0f172a"/>
  <text x="350" y="456" text-anchor="middle" fill="#06b6d4" font-family="system-ui" font-size="14" font-weight="600">245ms</text>
  
  <rect x="400" y="440" width="60" height="25" rx="5" fill="#0f172a"/>
  <text x="430" y="456" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="14" font-weight="600">12K</text>
  
  <!-- Web UI (Top Right) -->
  <rect x="580" y="60" width="140" height="80" rx="10" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="650" y="88" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">🌐 Web UI</text>
  
  <rect x="595" y="100" width="110" height="30" rx="5" fill="#0f172a"/>
  <rect x="600" y="105" width="50" height="6" rx="2" fill="url(#purple)" opacity="0.6"/>
  <rect x="600" y="116" width="90" height="4" rx="2" fill="#334155" opacity="0.5"/>
  <rect x="600" y="125" width="70" height="4" rx="2" fill="#334155" opacity="0.5"/>
  
  <!-- Export (Bottom Right) -->
  <rect x="580" y="400" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="650" y="425" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">📦 Export</text>
  
  <rect x="600" y="440" width="100" height="22" rx="5" fill="url(#green)" opacity="0.2"/>
  <text x="650" y="455" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="10">Export Report</text>
  
  <!-- Events (Bottom Left) -->
  <rect x="60" y="400" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="130" y="425" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">📡 Events</text>
  
  <g fill="#06b6d4" opacity="0.8">
    <circle cx="80" cy="450" r="4"/>
    <circle cx="95" cy="450" r="4"/>
    <circle cx="110" cy="450" r="4"/>
    <circle cx="125" cy="450" r="4"/>
    <circle cx="140" cy="450" r="4"/>
    <circle cx="155" cy="450" r="4"/>
    <circle cx="170" cy="450" r="4"/>
  </g>
  
  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="12">Like Chrome DevTools for AI Agents</text>
</svg>
