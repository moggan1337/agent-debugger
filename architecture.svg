<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Agent Debugger Architecture</text>
  
  <!-- Central Inspector -->
  <rect x="300" y="200" width="200" height="120" rx="15" fill="#0f172a" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#glow)"/>
  <text x="400" y="240" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Inspector</text>
  <text x="400" y="265" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11">Unified Debug Interface</text>
  
  <!-- Connection lines to inspector -->
  <path d="M300 260 L200 260" stroke="url(#primaryGrad)" stroke-width="2"/>
  <path d="M500 260 L600 260" stroke="url(#primaryGrad)" stroke-width="2"/>
  <path d="M400 200 L400 100" stroke="url(#primaryGrad)" stroke-width="2"/>
  <path d="M400 320 L400 420" stroke="url(#primaryGrad)" stroke-width="2"/>
  
  <!-- Reasoning Tracer (Left) -->
  <rect x="80" y="200" width="140" height="120" rx="10" fill="#1e293b" stroke="url(#purpleGrad)" stroke-width="2"/>
  <text x="150" y="230" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🧠 Tracer</text>
  <text x="150" y="250" text-anchor="middle" fill="#a855f7" font-family="Arial, sans-serif" font-size="10">Reasoning Trace</text>
  
  <!-- Trace items -->
  <rect x="90" y="265" width="120" height="8" rx="4" fill="#1e293b"/>
  <rect x="90" y="265" width="80" height="8" rx="4" fill="url(#purpleGrad)" opacity="0.8"/>
  
  <rect x="90" y="280" width="120" height="8" rx="4" fill="#1e293b"/>
  <rect x="90" y="280" width="100" height="8" rx="4" fill="url(#purpleGrad)" opacity="0.6"/>
  
  <rect x="90" y="295" width="120" height="8" rx="4" fill="#1e293b"/>
  <rect x="90" y="295" width="60" height="8" rx="4" fill="url(#purpleGrad)" opacity="0.4"/>
  
  <!-- Memory Viewer (Top) -->
  <rect x="300" y="60" width="200" height="100" rx="10" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">📊 Memory</text>
  <text x="400" y="110" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10">Memory Viewer</text>
  
  <!-- Memory bars -->
  <text x="315" y="130" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Short</text>
  <rect x="360" y="124" width="130" height="10" rx="5" fill="#1e293b"/>
  <rect x="360" y="124" width="90" height="10" rx="5" fill="url(#greenGrad)"/>
  
  <text x="315" y="148" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Long</text>
  <rect x="360" y="142" width="130" height="10" rx="5" fill="#1e293b"/>
  <rect x="360" y="142" width="70" height="10" rx="5" fill="url(#primaryGrad)"/>
  
  <!-- Tool Tracker (Right) -->
  <rect x="580" y="200" width="140" height="120" rx="10" fill="#1e293b" stroke="url(#orangeGrad)" stroke-width="2"/>
  <text x="650" y="230" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🔧 Tools</text>
  <text x="650" y="250" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">Tool Tracker</text>
  
  <!-- Tool call items -->
  <circle cx="595" cy="270" r="5" fill="#10b981"/>
  <text x="605" y="274" fill="#64748b" font-family="Arial, sans-serif" font-size="9">search... ✓</text>
  
  <circle cx="595" cy="290" r="5" fill="#10b981"/>
  <text x="605" y="294" fill="#64748b" font-family="Arial, sans-serif" font-size="9">read... ✓</text>
  
  <circle cx="595" cy="310" r="5" fill="#ef4444"/>
  <text x="605" y="314" fill="#64748b" font-family="Arial, sans-serif" font-size="9">exec... ✗</text>
  
  <!-- Performance Monitor (Bottom) -->
  <rect x="300" y="420" width="200" height="120" rx="10" fill="#1e293b" stroke="url(#primaryGrad)" stroke-width="2"/>
  <text x="400" y="455" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">⚡ Performance</text>
  <text x="400" y="475" text-anchor="middle" fill="#06b6d4" font-family="Arial, sans-serif" font-size="10">Performance Monitor</text>
  
  <!-- Metrics grid -->
  <rect x="320" y="490" width="70" height="35" rx="5" fill="#0f172a"/>
  <text x="355" y="510" text-anchor="middle" fill="#06b6d4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">245ms</text>
  <text x="355" y="522" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="8">Latency</text>
  
  <rect x="410" y="490" width="70" height="35" rx="5" fill="#0f172a"/>
  <text x="445" y="510" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">12.4K</text>
  <text x="445" y="522" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="8">Tokens</text>
  
  <!-- Web UI (Top Right) -->
  <rect x="580" y="60" width="150" height="100" rx="10" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
  <text x="655" y="90" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">🌐 Web UI</text>
  
  <!-- Mini UI preview -->
  <rect x="595" y="100" width="120" height="50" rx="5" fill="#1e293b"/>
  <rect x="600" y="105" width="40" height="8" rx="2" fill="url(#purpleGrad)" opacity="0.6"/>
  <rect x="600" y="118" width="100" height="6" rx="2" fill="#64748b" opacity="0.3"/>
  <rect x="600" y="130" width="80" height="6" rx="2" fill="#64748b" opacity="0.3"/>
  
  <!-- Arrow to inspector -->
  <path d="M655 160 L655 200" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="650,195 660,195 655,205" fill="#64748b"/>
  
  <!-- Event Stream -->
  <rect x="80" y="420" width="150" height="100" rx="10" fill="#1e293b"/>
  <text x="155" y="450" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📡 Events</text>
  <text x="155" y="470" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Real-time Updates</text>
  
  <!-- Event stream dots -->
  <circle cx="100" cy="490" r="4" fill="#10b981"/>
  <circle cx="115" cy="490" r="4" fill="#06b6d4"/>
  <circle cx="130" cy="490" r="4" fill="#a855f7"/>
  <circle cx="145" cy="490" r="4" fill="#f59e0b"/>
  <circle cx="160" cy="490" r="4" fill="#ef4444"/>
  <circle cx="175" cy="490" r="4" fill="#10b981"/>
  <circle cx="190" cy="490" r="4" fill="#06b6d4"/>
  <circle cx="205" cy="490" r="4" fill="#a855f7"/>
  
  <!-- Arrow to inspector -->
  <path d="M200 420 L300 300" stroke="#64748b" stroke-width="2" fill="none"/>
  
  <!-- Export (Bottom Right) -->
  <rect x="580" y="420" width="150" height="100" rx="10" fill="#1e293b"/>
  <text x="655" y="450" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📦 Export</text>
  <text x="655" y="470" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">JSON / Reports</text>
  
  <rect x="600" y="480" width="110" height="25" rx="5" fill="url(#greenGrad)" opacity="0.2"/>
  <text x="655" y="497" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10">Export Report</text>
  
  <!-- Arrow to inspector -->
  <path d="M580 470 L500 320" stroke="#64748b" stroke-width="2" fill="none"/>
  
  <!-- Bottom label -->
  <text x="400" y="570" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Like Chrome DevTools for AI Agents</text>
</svg>
