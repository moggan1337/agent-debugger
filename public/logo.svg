<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a2e" rx="20"/>
  
  <!-- Magnifying glass -->
  <circle cx="180" cy="170" r="80" stroke="url(#grad1)" stroke-width="12" fill="none"/>
  <circle cx="180" cy="170" r="60" stroke="url(#grad1)" stroke-width="4" fill="none" opacity="0.3"/>
  
  <!-- Brain pattern inside magnifier -->
  <path d="M140 170 Q160 140 180 170 Q200 200 220 170" stroke="url(#grad2)" stroke-width="3" fill="none"/>
  <path d="M150 155 Q175 180 200 155" stroke="url(#grad2)" stroke-width="2" fill="none"/>
  <path d="M150 185 Q175 160 200 185" stroke="url(#grad2)" stroke-width="2" fill="none"/>
  
  <!-- Handle -->
  <rect x="240" y="230" width="80" height="25" rx="12" fill="url(#grad1)" transform="rotate(45 280 242)"/>
  
  <!-- Connection nodes -->
  <circle cx="100" cy="100" r="15" fill="url(#grad2)"/>
  <circle cx="300" cy="80" r="12" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="320" cy="280" r="18" fill="url(#grad2)" opacity="0.9"/>
  <circle cx="80" cy="300" r="10" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="250" cy="340" r="14" fill="url(#grad2)"/>
  
  <!-- Connection lines -->
  <line x1="115" y1="100" x2="130" y2="130" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="285" y1="90" x2="250" y2="120" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="295" x2="260" y2="260" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="290" x2="110" y2="250" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <line x1="245" y1="325" x2="220" y2="290" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="200" r="5" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="350" cy="150" r="4" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="180" cy="350" r="6" fill="url(#grad1)" opacity="0.5"/>
  
  <!-- Code brackets overlay -->
  <text x="200" y="330" font-family="monospace" font-size="60" font-weight="bold" fill="url(#grad1)" text-anchor="middle" opacity="0.15">{</text>
  <text x="220" y="370" font-family="monospace" font-size="60" font-weight="bold" fill="url(#grad2)" text-anchor="middle" opacity="0.15">}</text>
  
  <!-- Title -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#eaeaea" text-anchor="middle">AGENT DEBUGGER</text>
</svg>
