<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#bg)" rx="24"/>
  
  <!-- Magnifying glass -->
  <g filter="url(#glow)">
    <!-- Handle -->
    <rect x="290" y="270" width="70" height="22" rx="11" fill="url(#handle)" transform="rotate(45 325 281)"/>
  </g>
  
  <!-- Glass circle -->
  <circle cx="220" cy="210" r="100" fill="none" stroke="url(#glass)" stroke-width="8"/>
  <circle cx="220" cy="210" r="92" fill="#0a0a0f"/>
  <circle cx="220" cy="210" r="85" fill="none" stroke="url(#glass)" stroke-width="1" opacity="0.3"/>
  
  <!-- Brain pattern inside -->
  <g fill="none" stroke="url(#brain)" stroke-width="3" stroke-linecap="round">
    <!-- Neural connections -->
    <path d="M160 190 Q180 170 200 190 Q220 210 240 190"/>
    <path d="M170 210 Q200 190 230 210"/>
    <path d="M180 230 Q200 250 220 230 Q240 210 260 230"/>
    <path d="M200 180 V230"/>
  </g>
  
  <!-- Neural nodes -->
  <g fill="url(#brain)">
    <circle cx="160" cy="190" r="8"/>
    <circle cx="200" cy="190" r="8"/>
    <circle cx="240" cy="190" r="8"/>
    <circle cx="170" cy="210" r="6"/>
    <circle cx="220" cy="210" r="12" filter="url(#glow)"/>
    <circle cx="230" cy="210" r="6"/>
    <circle cx="180" cy="230" r="6"/>
    <circle cx="220" cy="230" r="6"/>
    <circle cx="260" cy="230" r="6"/>
  </g>
  
  <!-- Floating debug elements -->
  <g fill="url(#glass)" opacity="0.7">
    <circle cx="100" cy="100" r="6"/>
    <circle cx="400" cy="120" r="5"/>
    <circle cx="420" cy="350" r="7"/>
    <circle cx="80" cy="380" r="5"/>
  </g>
  
  <!-- Code brackets -->
  <text x="90" y="90" font-family="monospace" font-size="36" fill="url(#glass)" opacity="0.4">{</text>
  <text x="115" y="140" font-family="monospace" font-size="36" fill="url(#glass)" opacity="0.4">}</text>
  
  <!-- Title -->
  <text x="256" y="450" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600">AGENT DEBUGGER</text>
  <text x="256" y="478" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="3">SEE INSIDE YOUR AGENT</text>
</svg>
